# Warning: Do not unify this file with others. Keep tool definitions localized.
[tools]
go = "1.26.4"
bun = "1.3.14"
goreleaser = "2.17.0"
svu = "3.3.0"

[tasks.install]
run = "go mod tidy && go get -v ./... && bun install"

[tasks.codegen]
description = "Rebuild embedded web CSS"
run = "bun run build:css"

[tasks.format]
description = "Format Go packages"
run = "go fmt ./..."

[tasks.ci]
description = "CI checks and tests"
depends = ["codegen"]
# checkptr=0: modernc tree-sitter uses unsafe pointer arithmetic that checkptr (enabled by -race) rejects.
run = "go test -race -gcflags=all=-d=checkptr=0 ./... && go build -o /dev/null ./cmd/contapila/"

[tasks.release]
description = "Run a release"
depends = ["ci"]
usage = '''
arg "<version>" help="New version" {
  choices "next" "major" "minor" "patch"
  default "next"
}
'''
run = '''
git tag $(svu ${usage_version})
goreleaser release --clean
'''
