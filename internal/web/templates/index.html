<!doctype html>
<html lang="en" data-theme="light">
<head>
  {{template "head" .}}
</head>
{{template "app-open" .}}
    <header class="mb-3">
      <h1 class="text-base font-semibold tracking-tight">Ledgers</h1>
      <p class="mt-0.5 text-xs font-mono text-base-content/50 break-all">{{.ProjectRoot}}</p>
    </header>

    {{if not .Ledgers}}
    <div role="alert" class="alert alert-soft py-2 text-xs">
      <span>No ledgers. Add <code class="font-mono">&lt;name&gt;/main.beancount</code>.</span>
    </div>
    {{else}}
    <div class="overflow-x-auto border border-base-300">
      <table class="table table-xs">
        <thead>
          <tr><th>Ledger</th><th></th></tr>
        </thead>
        <tbody>
          {{range .Ledgers}}
          <tr>
            <td class="font-medium"><a class="link link-hover link-primary" href="/l/{{.}}/check">{{.}}</a></td>
            <td class="text-right text-xs opacity-50">check →</td>
          </tr>
          {{end}}
        </tbody>
      </table>
    </div>
    <p class="mt-3 text-xs text-base-content/50">Read-only. Edit <span class="font-mono">.beancount</span> in your editor.</p>
    {{end}}
  {{template "app-close" .}}
</html>
